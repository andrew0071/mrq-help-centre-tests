name: Run Help Centre Tests

on:
  workflow_dispatch:

jobs:
  test:
    name: Playwright Cucumber Tests
    runs-on: ubuntu-latest
    timeout-minutes: 15

    env:
      BASE_URL: https://help.mrq.com/en/
      HEADLESS: "true"
      BROWSER: chromium

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Chromium
        run: npx playwright install --with-deps chromium

      - name: Check TypeScript
        run: npx tsc --noEmit

      - name: Run tests
        run: npm test